# --- Semantic Scholar ---
semantic_scholar:
  queries:
    - "operations research optimization"
    - "combinatorial optimization heuristic"
    - "healthcare scheduling rostering"
    - "vehicle routing problem"
    - "integer programming branch and bound"
    - "robust optimization uncertainty"
  fields_of_study:
    - Mathematics
    - Computer Science
    - Engineering
  lookback_days: 7
  max_results_per_query: 20

