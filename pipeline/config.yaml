# --- arXiv ---
arxiv:
  categories:
    - math.OC      # Core: Optimization & Control
    - cs.AI        # AI for OR
    - cs.DS        # Data Structures & Algorithms
    - stat.ML      # Statistical ML
    - cs.LG        # ML (CS) — neural combinatorial optimization
    - eess.SY      # Systems & Control
    - cs.DM        # Discrete Mathematics
  rss_feeds:
    - https://rss.arxiv.org/rss/math.OC
    - https://rss.arxiv.org/rss/cs.AI
    - https://rss.arxiv.org/rss/cs.DS
    - https://rss.arxiv.org/rss/stat.ML
    - https://rss.arxiv.org/rss/cs.LG
    - https://rss.arxiv.org/rss/eess.SY
    - https://rss.arxiv.org/rss/cs.DM
  max_results_per_category: 50
  lookback_days: 3
  delay_seconds: 3

