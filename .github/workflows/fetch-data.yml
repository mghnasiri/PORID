name: Daily Data Fetch

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data pipeline
        run: python pipeline/run_pipeline.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}

      - name: Compute trends
        run: python pipeline/compute_trends.py

      - name: Fetch solver data
        run: python pipeline/fetch_solvers.py
        continue-on-error: true

      - name: Build weekly brief
        run: python pipeline/build_brief.py
        continue-on-error: true

      - name: Build daily digest
        run: python pipeline/build_digest.py

      - name: Send digest email
        run: python pipeline/send_email.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        continue-on-error: true

      - name: Build RSS feed
        run: python pipeline/build_rss.py

      - name: Build iCal feed
        run: python pipeline/build_ical.py

      - name: Refresh static fallback copies
        run: |
          mkdir -p data/static
          cp -f data/solvers.json data/static/solvers.json 2>/dev/null || true
          cp -f data/benchmarks.json data/static/benchmarks.json 2>/dev/null || true
          cp -f data/compatibility_matrix.json data/static/compatibility_matrix.json 2>/dev/null || true
          cp -f data/decision_rules.json data/static/decision_rules.json 2>/dev/null || true
          cp -f data/modeling_tools.json data/static/modeling_tools.json 2>/dev/null || true

      - name: Copy data to src for deployment
        run: |
          cp -f data/*.json src/data/ 2>/dev/null || true
          cp -f data/*.xml src/data/ 2>/dev/null || true
          cp -f data/*.ics src/data/ 2>/dev/null || true
          cp -f data/digest-*.json src/data/ 2>/dev/null || true
          cp -f data/brief-*.json src/data/ 2>/dev/null || true
          mkdir -p src/data/briefs 2>/dev/null || true
          cp -f data/briefs/*.json src/data/briefs/ 2>/dev/null || true
          mkdir -p src/data/static 2>/dev/null || true
          cp -f data/static/*.json src/data/static/ 2>/dev/null || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        id: auto-commit
        with:
          commit_message: "chore: daily data fetch"
          file_pattern: "data/*.json data/*.xml data/*.ics data/static/*.json src/data/*.json src/data/*.xml src/data/*.ics src/data/static/*.json"

      # Deploy to GitHub Pages directly (don't rely on deploy.yml trigger)
      - name: Prepare site
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: |
          mkdir -p _site
          cp -r src/* _site/
          cp -r data _site/data

      - uses: actions/upload-pages-artifact@v3
        if: steps.auto-commit.outputs.changes_detected == 'true'

      - name: Deploy to GitHub Pages
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: actions/deploy-pages@v4

      - name: Send failure notification email
        if: failure()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python -c "
          import smtplib, os, yaml
          from email.mime.text import MIMEText
          from pathlib import Path

          user = os.environ.get('SMTP_USER', '')
          pwd  = os.environ.get('SMTP_PASSWORD', '')
          if not user or not pwd:
              print('SMTP credentials not set, skipping failure email.')
              exit(0)

          # Load recipient from config
          cfg = yaml.safe_load(Path('pipeline/config.yaml').read_text())
          to = cfg.get('email', {}).get('recipient', '')
          if not to or to == 'your-email@example.com':
              print('No recipient configured, skipping failure email.')
              exit(0)

          run_url = f'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          body = f'''PORID daily pipeline failed.

          Workflow: ${{ github.workflow }}
          Run:      {run_url}
          Branch:   ${{ github.ref_name }}
          Trigger:  ${{ github.event_name }}

          Check the run logs for details.
          '''

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['From']    = user
          msg['To']      = to
          msg['Subject'] = 'PORID Pipeline FAILED — ${{ github.run_id }}'

          with smtplib.SMTP('smtp.gmail.com', 587, timeout=30) as s:
              s.starttls()
              s.login(user, pwd)
              s.send_message(msg)
          print(f'Failure notification sent to {to}')
          "
